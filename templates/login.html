<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Kizito Okoro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-theme="light">

    <div class="centered-flex">
        <div class="glass-card form-card">
            
            <div style="text-align: center; margin-bottom: 30px;">
                <div class="logo" style="margin-bottom: 10px;">
                    KIZITO<span class="accent-dot">.</span>OKORO
                </div>
                <h2 style="font-weight: 800; font-size: 1.5rem;">Welcome Back</h2>
                <p style="font-size: 0.85rem; opacity: 0.6;">Secure Access Portal</p>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="glass-card" style="background: rgba(239, 68, 68, 0.1); border-color: #ef4444; color: #ef4444; padding: 12px; margin-bottom: 20px; font-size: 0.8rem; font-weight: 600; text-align: center; border-radius: 12px;">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter admin username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary full-width" style="margin-top: 10px;">
                    Login to Dashboard
                </button>
            </form>

            <div style="text-align: center; margin-top: 30px;">
                <a href="/" style="font-size: 0.8rem; font-weight: 700; opacity: 0.5; transition: 0.3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">
                    <i class="fas fa-arrow-left"></i> Back to Portfolio
                </a>
            </div>
        </div>
    </div>

    <script>
        // Sync theme with local storage on load
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
        });
    </script>
</body>
</html>
