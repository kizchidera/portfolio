<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Design | Derki Visuals</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .form-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .form-card h2 {
            font-weight: 800;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        .form-card p {
            font-size: 0.9rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.5);
            font-family: 'Poppins', sans-serif;
        }
        .pay-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .pay-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        .fee-badge {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.75rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body data-theme="light">

    <div class="form-card">
        <a href="/" style="text-decoration: none; font-size: 0.8rem; color: var(--primary); font-weight: 700;">← BACK TO PORTFOLIO</a>
        <h2 style="margin-top: 15px;">Let's Create.</h2>
        <span class="fee-badge">Consultation Fee: ₦2,000</span>
        <p>Fill out the details below. You will be redirected to a secure payment page to confirm your request.</p>

        <form action="/request-design" method="POST">
            <div class="input-group">
                <label>Your Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="john@example.com" required>
            </div>

            <div class="input-group">
                <label>Project Details</label>
                <textarea name="details" rows="4" placeholder="Describe what you need (Logo, Flyer, etc.)" required></textarea>
            </div>

            <button type="submit" class="pay-btn">Proceed to Payment</button>
        </form>
        
        <p style="font-size: 0.7rem; margin-top: 20px; text-align: center; opacity: 0.6;">
            Securely processed by Paystack.
        </p>
    </div>

    <script>
        // Check local storage for theme preference
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
